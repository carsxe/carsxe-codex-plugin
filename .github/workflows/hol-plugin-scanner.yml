name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Pin cryptography for scanner compatibility
        run: python3 -m pip install "cryptography<49" --quiet

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@cc44948e99065212260df501c2ecb6ed5de4201b  # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          upload_sarif: true
