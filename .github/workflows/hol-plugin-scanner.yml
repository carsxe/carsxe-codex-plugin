name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Pin cryptography for scanner compatibility
        run: python3 -m pip install "cryptography<49" --quiet

      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@260cc0d630501bd6507461c0f50dce5a13bd506d  # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: critical
          format: sarif
          upload_sarif: true
